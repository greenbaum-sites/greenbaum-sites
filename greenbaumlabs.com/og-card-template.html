<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { width:1200px; height:630px; background:#0a0f0c; font-family:'Instrument Sans',sans-serif; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; }
body::before { content:''; position:absolute; inset:0; background-image:radial-gradient(circle,rgba(52,211,153,.06) 1px,transparent 1px); background-size:40px 40px; mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 20%,transparent 80%); -webkit-mask-image:radial-gradient(ellipse 70% 70% at 50% 50%,black 20%,transparent 80%); }
.content { position:relative; z-index:1; text-align:center; max-width:900px; }
.mark { color:#34D399; margin-bottom:2rem; }
.brand { font-weight:700; font-size:1.1rem; letter-spacing:.2em; text-transform:uppercase; color:#f0ece4; margin-bottom:2.5rem; }
.headline { font-weight:700; font-size:3rem; line-height:1.15; letter-spacing:-.03em; color:#f0ece4; margin-bottom:1.5rem; }
.sub { font-size:1.2rem; color:#b0ada6; line-height:1.6; }
.rule { display:flex; align-items:center; justify-content:center; gap:1.5rem; margin-top:2rem; }
.rule span { font-family:'JetBrains Mono',monospace; font-size:.65rem; letter-spacing:.15em; text-transform:uppercase; color:#706d68; }
.rule-line { width:40px; height:1px; background:rgba(52,211,153,.3); }
</style>
</head>
<body>
<div class="content">
<svg class="mark" viewBox="0 0 400 400" width="56" height="56"><polyline points="148,82 36,196 148,310" stroke="currentColor" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/><polygon points="204,136 264,196 204,256 144,196" stroke="currentColor" stroke-width="14" stroke-linejoin="round" fill="none"/><line x1="366" y1="196" x2="254" y2="310" stroke="currentColor" stroke-width="14" stroke-linecap="round"/><line x1="204" y1="256" x2="148" y2="310" stroke="currentColor" stroke-width="14" stroke-linecap="round"/><line x1="204" y1="256" x2="254" y2="310" stroke="currentColor" stroke-width="14" stroke-linecap="round"/></svg>
<div class="brand">Greenbaum Labs</div>
<div class="headline">Bloodwork for how your<br>organization makes decisions.</div>
<div class="sub">Structural diagnostics that surface the conditions<br>that produce failure, before the failure arrives.</div>
<div class="rule"><div class="rule-line"></div><span>greenbaumlabs.com</span><div class="rule-line"></div></div>
</div>
</body>
</html>
